<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vidhwaan Registry</title>

<meta name="description" content="Create your official Vidhwaan identity profile. Join the global Vidhwaan community.">

<link rel="icon" href="./favicon.ico">

<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- CSS (Vidhwaan ecosystem) -->
<link rel="stylesheet" href="./css/design-system.css">
<link rel="stylesheet" href="./css/main.css">

</head>

<body>

<!-- NAVBAR -->
<div id="nav"></div>

<!-- HERO -->
<div id="hero"></div>

<!-- REGISTRATION -->
<div id="registration"></div>

<!-- FOOTER -->
<div id="footer"></div>


<!-- MODULE SYSTEM -->
<script type="module">

import { loadNav } from "./js/nav.js"
import { loadHero } from "./js/hero.js"
import { loadFooter } from "./js/footer.js"
import { loadRegistration } from "./js/registration.js"

/* LOAD IN ORDER */
loadNav()
loadHero()
loadRegistration()
loadFooter()

</script>


<!-- GLOBAL FUNCTIONS -->
<script>

/* REGISTER FUNCTION (WILL BE USED NEXT STEP) */
async function registerUser(){

const state = document.getElementById("state").value;
const district = document.getElementById("district").value;
const subdistrict = document.getElementById("subdistrict").value;
const village = document.getElementById("village").value;

const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const phone = document.getElementById("phone").value.trim();
const instrument = document.getElementById("instrument").value;

if(!state || !district || !subdistrict || !village){
alert("Please select full location");
return;
}

if(!firstName || !lastName || !phone || !instrument){
alert("Please fill all details");
return;
}

if(!/^[6-9][0-9]{9}$/.test(phone)){
alert("Enter valid mobile number");
return;
}

/* TEMP OUTPUT (NEXT STEP: GITHUB INTEGRATION) */

const slug = `pelli-melam-${state}-${district}-${subdistrict}-${village}-${phone}`;

const url = `${location.origin}/${slug}`;

document.getElementById("result").innerHTML = `
<a href="${url}" target="_blank" style="color:#2563eb;">
${url}
</a>
`;

alert("Registration Ready ✅ (Next step: GitHub integration)");

}

</script>


<!-- OPTIONAL EFFECT (FROM YOUR SYSTEM) -->
<script>
document.addEventListener("mousemove", (e) => {

document.querySelectorAll(".card").forEach(card => {

const rect = card.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

card.style.setProperty("--x", x + "px");
card.style.setProperty("--y", y + "px");

});

});
</script>

</body>
</html>

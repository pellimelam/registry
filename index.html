<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vidhwaan Community Registration</title>

<meta name="description" content="Register as a Vidhwaan and create your official profile in the Vidhwaan community.">

<link rel="icon" href="./favicon.ico">

<!-- CSS -->
<link rel="stylesheet" href="./css/design-system.css">
<link rel="stylesheet" href="./css/main.css">

</head>

<body>

<!-- NAV -->
<div id="nav"></div>

<!-- HERO -->
<div id="hero"></div>

<!-- REGISTRATION -->
<div id="registration"></div>

<!-- FOOTER -->
<div id="footer"></div>


<!-- MODULE LOAD -->
<script type="module">

import { loadNav } from "./utilities/nav.js"
import { loadHero } from "./utilities/hero.js"
import { loadFooter } from "./utilities/footer.js"
import { loadRegistration } from "./utilities/registration.js"

loadNav()
loadHero()
loadRegistration()
loadFooter()

</script>


<!-- REGISTER FUNCTION -->
<script>

async function registerUser(){

const state = document.getElementById("state").value;
const district = document.getElementById("district").value;
const subdistrict = document.getElementById("subdistrict").value;
const village = document.getElementById("village").value;

const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const phone = document.getElementById("phone").value.trim();
const instrument = document.getElementById("instrument").value;

/* VALIDATION */

if(!state || !district || !subdistrict || !village){
alert("Please select complete location");
return;
}

if(!firstName || !lastName || !phone || !instrument){
alert("Please fill all details");
return;
}

if(!/^[6-9][0-9]{9}$/.test(phone)){
alert("Enter valid mobile number");
return;
}

/* URL GENERATION (TEMP) */

const slug = `pelli-melam-${village}-${phone}`;
const url = location.origin + "/" + slug;

/* SHOW RESULT */

document.getElementById("result").innerHTML = `
<a href="${url}" target="_blank" style="color:#2563eb;">
${url}
</a>
`;

alert("Registration ready ✅");

}

</script>


<!-- OPTIONAL CARD HOVER EFFECT -->
<script>

document.addEventListener("mousemove", (e) => {

document.querySelectorAll(".card").forEach(card => {

const rect = card.getBoundingClientRect();

const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

card.style.setProperty("--x", x + "px");
card.style.setProperty("--y", y + "px");

});

});

</script>

</body>
</html>

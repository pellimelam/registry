<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vidhwaan Registry</title>

<meta name="description" content="Official Vidhwaan Community Registration Platform">

<link rel="icon" href="./favicon.ico">

<link rel="stylesheet" href="./css/design-system.css">
<link rel="stylesheet" href="./css/main.css">

</head>

<body>

<div id="nav"></div>
<div id="hero"></div>
<div id="registration"></div>
<div id="footer"></div>

<script type="module">

import { loadNav } from "./utilities/nav.js"
import { loadHero } from "./utilities/hero.js"
import { loadFooter } from "./utilities/footer.js"
import { loadRegistration } from "./utilities/registration.js"

loadNav()
loadHero()
loadRegistration()
loadFooter()

</script>

<script>

async function registerUser(){

const state = document.getElementById("state").value;
const district = document.getElementById("district").value;
const subdistrict = document.getElementById("subdistrict").value;
const village = document.getElementById("village").value;

const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const phone = document.getElementById("phone").value.trim();
const instrument = document.getElementById("instrument").value;

if(!state || !district || !subdistrict || !village){
alert("Select full location");
return;
}

if(!firstName || !lastName || !phone || !instrument){
alert("Fill all details");
return;
}

if(!/^[6-9][0-9]{9}$/.test(phone)){
alert("Enter valid mobile number");
return;
}

const slug = `pelli-melam-${village}-${phone}`;
const url = location.origin + "/" + slug;

document.getElementById("result").innerHTML = `
<a href="${url}" target="_blank">${url}</a>
`;

alert("Registration Ready ✅");

}

</script>

</body>
</html>
